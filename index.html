function buildSchedule(track){
  const days = [];
  track.modules.forEach(mod => {
    mod.topics.forEach(topic => days.push({ moduleId: mod.id, kind: 'topic', title: topic }));
    days.push({ moduleId: mod.id, kind: 'desafio', title: mod.desafio });
  });
  let cicloIdx = 0;
  days.forEach((d, i) => {
    if ((i+1) % track.ciclosEvery === 0 && cicloIdx < track.ciclos.length){
      d.bonus = track.ciclos[cicloIdx]; d.bonusLabel = track.ciclosLabel; cicloIdx++;
    }
  });
  return days;
}
Object.keys(TRACKS).forEach(k => { TRACKS[k].schedule = buildSchedule(TRACKS[k]); });

// ====== SUPABASE HELPERS ======
async function fetchRow(userId, key){
  const { data, error } = await sb.from('progress').select('value').eq('user_id', userId).eq('key', key).maybeSingle();
  if(error){ console.error(error); return null; }
  return data ? data.value : null;
}
async function upsertRow(userId, key, value){
  STATE.syncing = true;
  const { error } = await sb.from('progress').upsert({ user_id: userId, key, value, updated_at: new Date().toISOString() });
  STATE.syncing = false;
  if(error) console.error(error);
}
async function loadTrackData(userId, trackKey){
  let progress = await fetchRow(userId, 'progress_' + trackKey);
  let startDate = await fetchRow(userId, 'startDate_' + trackKey);
  if(!progress) progress = {};
  if(!startDate){
    startDate = new Date().toISOString().slice(0,10);
    await upsertRow(userId, 'startDate_' + trackKey, startDate);
  }
  STATE.data[trackKey].progress = progress;
  STATE.data[trackKey].startDate = startDate;
}
async function saveProgress(trackKey){
  await upsertRow(STATE.user.id, 'progress_' + trackKey, STATE.data[trackKey].progress);
}

// ====== LÓGICA GENÉRICA (parametrizada por track) ======
function td(trackKey){ return STATE.data[trackKey]; }
function schedule(trackKey){ return TRACKS[trackKey].schedule; }

function dayDate(trackKey, idx){
  const start = new Date(td(trackKey).startDate + 'T00:00:00');
  const d = new Date(start); d.setDate(d.getDate() + idx);
  return d;
}
function fmtDate(d){ return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' }); }
function todayIndex(trackKey){
  const start = new Date(td(trackKey).startDate + 'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.max(0, Math.floor((now - start) / 86400000));
}
function getDayProgress(trackKey, idx){ return td(trackKey).progress[idx] || {}; }
function dayTaskCount(trackKey, idx){ return schedule(trackKey)[idx].bonus ? 2 : 1; }
function dayDoneCount(trackKey, idx){
  const p = getDayProgress(trackKey, idx); let n = 0;
  if(p.main) n++; if(p.bonus) n++;
  return n;
}
function dayStatus(trackKey, idx){
  const total = dayTaskCount(trackKey, idx), done = dayDoneCount(trackKey, idx);
  if(done === 0) return 'none';
  if(done === total) return 'done';
  return 'partial';
}
function xpForTask(day, isBonus){ if(isBonus) return 5; return day.kind === 'desafio' ? 25 : 10; }
function totalXP(trackKey){
  let xp = 0;
  const sch = schedule(trackKey);
  Object.keys(td(trackKey).progress).forEach(k => {
    const idx = parseInt(k), d = sch[idx];
    if(!d) return;
    const p = td(trackKey).progress[k];
    if(p.main) xp += xpForTask(d, false);
    if(p.bonus) xp += xpForTask(d, true);
  });
  return xp;
}
function currentStreak(trackKey){
  const t = todayIndex(trackKey); let streak = 0;
  for(let i = t; i >= 0; i--){ if(getDayProgress(trackKey, i).main) streak++; else break; }
  return streak;
}
function overallProgress(trackKey){
  const sch = schedule(trackKey);
  let total = 0, done = 0;
  sch.forEach((d,i) => { total += dayTaskCount(trackKey, i); done += dayDoneCount(trackKey, i); });
  return total ? Math.round(done/total*100) : 0;
}
function moduleProgress(trackKey, modId){
  const sch = schedule(trackKey);
  const idxs = []; sch.forEach((d,i) => { if(d.moduleId === modId) idxs.push(i); });
  let total = 0, done = 0;
  idxs.forEach(i => { total += dayTaskCount(trackKey, i); done += dayDoneCount(trackKey, i); });
  return { pct: total ? Math.round(done/total*100) : 0 };
}

async function toggleTask(trackKey, idx, key){
  const p = td(trackKey).progress[idx] || {};
  p[key] = !p[key];
  td(trackKey).progress[idx] = p;
  renderApp();
  await saveProgress(trackKey);
  renderApp();
}
function goToDay(trackKey, idx){
  if(idx < 0 || idx >= schedule(trackKey).length) return;
  td(trackKey).currentDay = idx;
  renderApp();
}
function goToFirstDayOfModule(trackKey, modId){
  const i = schedule(trackKey).findIndex(d => d.moduleId === modId);
  if(i >= 0) goToDay(trackKey, i);
}
function switchTrack(trackKey){
  STATE.currentTrack = trackKey;
  renderApp();
}
async function resetProgress(trackKey){
  if(!confirm('Isso vai apagar o progresso salvo dessa trilha na nuvem. Confirmar?')) return;
  td(trackKey).progress = {};
  await saveProgress(trackKey);
  renderApp();
}
async function logout(){ await sb.auth.signOut(); render(); }

// ====== RENDER: APP ======
function renderApp(){
  const root = document.getElementById('root');
  const trackKey = STATE.currentTrack;
  const track = TRACKS[trackKey];
  const idx = td(trackKey).currentDay;
  const sch = schedule(trackKey);
  const day = sch[idx];
  const mod = track.modules.find(m => m.id === day.moduleId);
  const tIdx = todayIndex(trackKey);
  const xp = totalXP(trackKey);
  const level = Math.floor(xp / 100) + 1;
  const streak = currentStreak(trackKey);
  const p = getDayProgress(trackKey, idx);

  // Tabs
  let tabsHTML = '';
  Object.keys(TRACKS).forEach(k => {
    const t = TRACKS[k];
    const pct = overallProgress(k);
    tabsHTML += `
      <div class="track-tab ${k===trackKey?'active':''}" style="--accent:${t.accent}" onclick="switchTrack('${k}')">
        <div class="tt-name">${t.label} ${t.urgent ? '<span class="urgent-tag">Prioridade</span>' : ''}</div>
        <div class="tt-desc">${t.desc}</div>
        <div class="tt-bar"><div class="tt-bar-fill" style="width:${pct}%; background:${t.accent}"></div></div>
        <div class="tt-pct">${pct}% concluído</div>
      </div>`;
  });

  // Trail
  let trailHTML = '';
  sch.forEach((d, i) => {
    const status = dayStatus(trackKey, i);
    const cls = ['node'];
    if(i === tIdx) cls.push('today');
    if(i === idx) cls.push('active');
    if(status === 'done') cls.push('done');
    if(status === 'partial') cls.push('partial');
    if(d.kind === 'desafio') cls.push('challenge');
    const connectorDone = i > 0 && dayStatus(trackKey, i-1) === 'done';
    trailHTML += (i>0 ? `<div class="connector ${connectorDone?'done':''}"></div>` : '');
    trailHTML += `<div class="${cls.join(' ')}" onclick="goToDay('${trackKey}', ${i})" title="Dia ${i+1} — Módulo ${d.moduleId}">${i+1}</div>`;
  });

  // Sidebar modules
  let modulesHTML = '';
  track.modules.forEach(m => {
    const mp = moduleProgress(trackKey, m.id);
    modulesHTML += `
      <div class="module-item ${m.id===mod.id?'current':''}" onclick="goToFirstDayOfModule('${trackKey}', ${m.id})">
        <div class="mtitle"><span>${m.id}. ${m.name}</span><span>${mp.pct}%</span></div>
        <div class="bar"><div class="bar-fill" style="width:${mp.pct}%; background:${track.accent}"></div></div>
      </div>`;
  });

  const kindLabel = day.kind === 'desafio' ? 'Missão Desafio 🏆' : 'Missão Principal 🎯';
  const kindClass = day.kind === 'desafio' ? 'desafio' : 'principal';
  const mainXP = xpForTask(day, false);

  let tasksHTML = `
    <div class="task ${kindClass} ${p.main?'done':''}">
      <input type="checkbox" ${p.main?'checked':''} onchange="toggleTask('${trackKey}', ${idx}, 'main')">
      <div class="tt">
        <div class="kind">${kindLabel}</div>
        <div class="desc ${p.main?'strike':''}">${day.title}</div>
      </div>
      <div class="xp-chip">+${mainXP} XP</div>
    </div>`;

  if(day.bonus){
    tasksHTML += `
      <div class="task ${p.bonus?'done':''}" style="border-color:${p.bonus?track.accent:'transparent'}">
        <input type="checkbox" ${p.bonus?'checked':''} onchange="toggleTask('${trackKey}', ${idx}, 'bonus')">
        <div class="tt">
          <div class="kind" style="color:${track.accent}">Bônus · ${day.bonusLabel}</div>
          <div class="desc ${p.bonus?'strike':''}">${day.bonus}</div>
        </div>
        <div class="xp-chip">+5 XP</div>
      </div>`;
  }

  tasksHTML += `
    <div class="task" style="background:transparent; border:1px dashed var(--line);">
      <div class="tt">
        <div class="kind">🧠 Revisão (Regra 2)</div>
        <div class="desc" style="color:var(--muted)">Antes de marcar como concluído: explique o conteúdo de hoje em voz alta, sem consultar nada. Se não conseguir, ainda não aprendeu.</div>
      </div>
    </div>`;

  root.innerHTML = `
    <div class="wrap">
      <header class="top">
        <div>
          <h1>Trilha de Estudos — Marcos Levi</h1>
          <div class="sub">Acadêmico + Redes &amp; Segurança rodando em paralelo</div>
          <div class="sync-badge">${STATE.syncing ? '⏳ sincronizando…' : '☁️ sincronizado — ' + STATE.user.email}</div>
          <button class="logout-btn" onclick="logout()">Sair</button>
        </div>
        <div class="stats">
          <div class="stat level"><div class="n">Lv ${level}</div><div class="l">Nível</div></div>
          <div class="stat"><div class="n">${xp}</div><div class="l">XP · ${track.label.replace(/^\S+\s/,'')}</div></div>
          <div class="stat streak"><div class="n">${streak}</div><div class="l">Streak</div></div>
        </div>
      </header>

      <div class="track-tabs">${tabsHTML}</div>

      <div class="trail-section">
        <h2>Trilha — ${track.label}</h2>
        <div class="trail-scroll"><div class="trail">${trailHTML}</div></div>
      </div>

      <div class="layout">
        <div class="panel modules">
          <h2>Módulos</h2>
          ${modulesHTML}
        </div>

        <div class="panel day-card">
          <div class="day-head">
            <div>
              <div class="tag">Módulo ${mod.id} · ${mod.disciplina}</div>
              <h2>Dia ${idx+1} — ${mod.name}</h2>
              <div class="date">${fmtDate(dayDate(trackKey, idx))}${idx===tIdx ? ' · hoje' : ''}</div>
            </div>
            <div class="nav-btns">
              <button onclick="goToDay('${trackKey}', ${idx-1})" ${idx===0?'disabled':''}>← Anterior</button>
              <button onclick="goToDay('${trackKey}', ${tIdx})">Hoje</button>
              <button onclick="goToDay('${trackKey}', ${idx+1})" ${idx===sch.length-1?'disabled':''}>Próximo →</button>
            </div>
          </div>
          ${tasksHTML}
        </div>
      </div>

      <footer>
        Progresso salvo na nuvem, sincronizado entre todos os seus dispositivos.
        <br><button onclick="resetProgress('${trackKey}')">Reiniciar progresso desta trilha</button>
      </footer>
    </div>
  `;
}

// ====== RENDER: AUTH ======
function renderAuth(message){
  const root = document.getElementById('root');
  const isSignup = AUTH_MODE === 'signup';
  root.innerHTML = `
    <div class="auth-wrap">
      <div class="auth-card">
        <h1>Trilha ADS</h1>
        <div class="sub">${isSignup ? 'Criar sua conta' : 'Entrar na sua trilha'}</div>
        ${message ? `<div class="auth-msg ${message.type}">${message.text}</div>` : ''}
        <div class="field"><label>E-mail</label><input type="email" id="authEmail" placeholder="seu@email.com" autocomplete="email"></div>
        <div class="field"><label>Senha</label><input type="password" id="authPassword" placeholder="mínimo 6 caracteres" autocomplete="${isSignup?'new-password':'current-password'}"></div>
        <button class="auth-btn" id="authSubmitBtn" onclick="handleAuthSubmit()">${isSignup ? 'Criar conta' : 'Entrar'}</button>
        <div class="auth-toggle">
          ${isSignup ? 'Já tem conta?' : 'Ainda não tem conta?'}
          <button onclick="toggleAuthMode()">${isSignup ? 'Entrar' : 'Criar conta'}</button>
        </div>
      </div>
    </div>`;
}
function toggleAuthMode(){ AUTH_MODE = AUTH_MODE === 'signup' ? 'login' : 'signup'; renderAuth(); }
async function handleAuthSubmit(){
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const btn = document.getElementById('authSubmitBtn');
  if(!email || !password){ renderAuth({type:'error', text:'Preencha e-mail e senha.'}); return; }
  btn.disabled = true;
  if(AUTH_MODE === 'signup'){
    const { data, error } = await sb.auth.signUp({ email, password });
    if(error){ renderAuth({type:'error', text: traduzErro(error.message)}); return; }
    if(data.session){ await startAppFor(data.session.user); }
    else { AUTH_MODE = 'login'; renderAuth({type:'ok', text:'Conta criada! Verifique seu e-mail para confirmar antes de entrar.'}); }
  } else {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if(error){ renderAuth({type:'error', text: traduzErro(error.message)}); return; }
    await startAppFor(data.user);
  }
}
function traduzErro(msg){
  if(msg.includes('Invalid login credentials')) return 'E-mail ou senha incorretos.';
  if(msg.includes('already registered')) return 'Esse e-mail já tem conta. Tente entrar.';
  if(msg.includes('Password should be')) return 'Senha muito curta (mínimo 6 caracteres).';
  return msg;
}

async function startAppFor(user){
  STATE.user = user;
  document.getElementById('root').innerHTML = '<div class="loading">Carregando suas trilhas…</div>';
  await loadTrackData(user.id, 'academica');
  await loadTrackData(user.id, 'redes');
  td('academica').currentDay = Math.min(todayIndex('academica'), schedule('academica').length - 1);
  td('redes').currentDay = Math.min(todayIndex('redes'), schedule('redes').length - 1);
  renderApp();
}

// ====== INIT ======
async function render(){
  const { data: { session } } = await sb.auth.getSession();
  if(session && session.user){ await startAppFor(session.user); }
  else { AUTH_MODE = 'login'; renderAuth(); }
}
render();
</script>
